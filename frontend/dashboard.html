<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Employee Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background: linear-gradient(to right, #dfe9f3, #ffffff);
            font-family: Arial, sans-serif;
            padding: 30px;
        }

        .container-box{

            max-width: 1100px;
            margin: auto;

        }

        .top-bar{

            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;

        }

        .title{

            color: #0d6efd;
            font-weight: bold;

        }

        .card-box{

            background: white;
            padding: 25px;
            border-radius: 18px;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.15);
            margin-bottom: 30px;

        }

        .table-box{

            background: white;
            padding: 25px;
            border-radius: 18px;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.15);

        }

        table th{

            background-color: #0d6efd !important;
            color: white !important;
            text-align: center;

        }

        table td{

            text-align: center;
            vertical-align: middle;

        }

    </style>

</head>

<body>

<div class="container-box">

    <div class="top-bar">

        <h2 class="title">Employee Management System</h2>

        <button class="btn btn-danger"
                onclick="logout()">

            Logout

        </button>

    </div>


    <div class="card-box">

        <h4 class="mb-4">Add Employee</h4>

        <form id="employeeForm">

            <div class="row">

                <div class="col-md-4 mb-3">

                    <input type="text"
                           class="form-control"
                           id="name"
                           placeholder="Employee Name">

                </div>

                <div class="col-md-4 mb-3">

                    <input type="email"
                           class="form-control"
                           id="email"
                           placeholder="Email Address">

                </div>

                <div class="col-md-4 mb-3">

                    <input type="text"
                           class="form-control"
                           id="department"
                           placeholder="Department">

                </div>

            </div>

            <button type="submit"
                    class="btn btn-primary">

                Add Employee

            </button>

        </form>

    </div>


    <div class="table-box">

        <div class="d-flex justify-content-between mb-3">

            <h4>Employee Records</h4>

            <input type="text"
                   id="searchInput"
                   class="form-control w-25"
                   placeholder="Search Employee"
                   onkeyup="searchEmployee()">

        </div>

        <table class="table table-bordered table-hover">

            <thead>

                <tr>

                    <th>ID</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Department</th>
                    <th>Actions</th>

                </tr>

            </thead>

            <tbody id="employeeTableBody">

            </tbody>

        </table>

    </div>

</div>


<script>

document.getElementById("employeeForm")
.addEventListener("submit", async function(e){

    e.preventDefault();

    const employee = {
        
        name: document.getElementById("name").value,
        email: document.getElementById("email").value,
        department: document.getElementById("department").value

    };

    const response = await fetch("http://localhost:8080/employees",{

        method: "POST",

        headers:{
            "Content-Type":"application/json"
        },

        body: JSON.stringify(employee)

    });

    if(response.ok){

        alert("Employee Added Successfully!");

        document.getElementById("employeeForm").reset();

        loadEmployees();

    }

});


async function loadEmployees(){

    const response = await fetch("http://localhost:8080/employees");

    const employees = await response.json();

    const tableBody = document.getElementById("employeeTableBody");

    tableBody.innerHTML = "";

    employees.forEach(emp => {

        tableBody.innerHTML += `

            <tr>

                <td>${emp.id}</td>
                <td>${emp.name}</td>
                <td>${emp.email}</td>
                <td>${emp.department}</td>

                <td>

                    <button class="btn btn-warning btn-sm"
                            onclick="editEmployee(${emp.id})">

                        Edit

                    </button>

                    <button class="btn btn-danger btn-sm"
                            onclick="deleteEmployee(${emp.id})">

                        Delete

                    </button>

                </td>

            </tr>

        `;

    });

}


function searchEmployee(){

    let input = document.getElementById("searchInput").value.toLowerCase();

    let rows = document.querySelectorAll("#employeeTableBody tr");

    rows.forEach(row => {

        let text = row.innerText.toLowerCase();

        row.style.display = text.includes(input) ? "" : "none";

    });

}


async function deleteEmployee(id){

    await fetch(`http://localhost:8080/employees/${id}`,{

        method: "DELETE"

    });

    alert("Employee Deleted!");

    loadEmployees();

}


function editEmployee(id){

    localStorage.setItem("editId", id);

    window.location.href = "edit.html";

}


function logout(){

    alert("Logged Out Successfully!");

    window.location.href = "login.html";

}


loadEmployees();

</script>
<footer class="text-center mt-4 text-muted">

    <p>
        © 2026 Employee Management System | Developed by Amruthavarshini S
    </p>

</footer>
</body>

</html>
